<script>

async function loadUserOrders(){

const table = document.getElementById("userOrderList");

try{

/* get logged user email */
const email = localStorage.getItem("userEmail");

if(!email){
table.innerHTML =
"<tr><td colspan='4'>Please login again</td></tr>";
return;
}

/* fetch only this user's orders */
const res = await fetch("/api/myorders/" + email);
const orders = await res.json();

/* move completed orders to bottom */
orders.sort((a,b)=>{
if(a.status === "Completed" && b.status !== "Completed") return 1;
if(a.status !== "Completed" && b.status === "Completed") return -1;
return 0;
});

if(orders.length === 0){
table.innerHTML =
"<tr><td colspan='4' style='text-align:center;'>No Orders Yet</td></tr>";
return;
}

table.innerHTML="";

orders.forEach(order=>{

let grouped = {};

order.items.forEach(i => {
  let qty = i.quantity || 1;

  if (grouped[i.name]) {
    grouped[i.name] += qty;
  } else {
    grouped[i.name] = qty;
  }
});

let items = Object.entries(grouped)
  .map(([name, qty]) => `${name} (${qty})`)
  .join(", ");

table.innerHTML += `
<tr>
<td>${order._id}</td>
<td>${items}</td>
<td>₹${order.totalPrice}</td>
<td>
<span class="status-badge ${
order.status === "Completed"
? "status-completed"
: "status-pending"
}">
${order.status || "Pending"}
</span>
</td>
</tr>
`;

});

}
catch(error){
console.error(error);
}

}

loadUserOrders();

/* refresh every 5 seconds */
setInterval(loadUserOrders,5000);

</script>
</body>
</html>
