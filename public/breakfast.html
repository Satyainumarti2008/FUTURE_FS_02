<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cafe Connect – Breakfast Menu</title>
  <link rel="stylesheet" href="css/home.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/breakfast.css">
  <script>
    function goHome() {
      window.location.href = "home.html";
    }

    // Updated to save Price as well
    function addToCart(itemName, itemPrice) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({ name: itemName, price: itemPrice });
      localStorage.setItem("cart", JSON.stringify(cart));
      document.getElementById("cartCount").innerText = cart.length;
      alert(itemName + " (₹" + itemPrice + ") added to cart! 🛒");
    }

    window.onload = function () {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      document.getElementById("cartCount").innerText = cart.length;
    };

    function openCart() {
      window.location.href = "cart.html";
    }

    function searchFood() {
      let input = document.getElementById('searchBar').value.toLowerCase();
      let items = document.getElementsByClassName('menu-item');
      for (let i = 0; i < items.length; i++) {
        let title = items[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
        items[i].style.display = title.includes(input) ? "" : "none";
      }
    }
  </script>
</head>

<body>

<header class="header">

    <img src="assets/logocafeconnect.jpeg" alt="Cafe Logo">
  </div>
  <div class="cart-icon" onclick="openCart()">

  </div>
