<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cafe Connect - Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="admin-body">
  <header class="admin-header">
    <button class="back-home-btn" onclick="goAdmin()">← Back to Dashboard</button>
    <h1 class="admin-title">Admin Dashboard</h1>
  </header>
  <main class="admin-container">
    <table class="order-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Items</th>
          <th>Total Price</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="adminOrderList">
        </tbody>
    </table>
  </main>
<script>
function goAdmin(){
  window.location.href = "admin1.html";
}
async function loadAdminOrders() {
  const orderList = document.getElementById("adminOrderList");
  try {
    const response = await fetch("/api/orders");
    const orders = await response.json();
    orders.sort((a, b) => {
  if (a.status === "Completed" && b.status !== "Completed") return 1;
  if (a.status !== "Completed" && b.status === "Completed") return -1;
  return 0;
});
    if (orders.length === 0) {
      orderList.innerHTML =
        "<tr><td colspan='5' style='text-align:center;'>No Orders Yet</td></tr>";
      return;
    }
    orderList.innerHTML = "";
    orders.forEach(order => {
      let grouped = {};
order.items.forEach(i => {
  let qty = i.quantity || 1;
  if (grouped[i.name]) {
    grouped[i.name] += qty;
  } else {
    grouped[i.name] = qty;
  }
});
let items = Object.entries(grouped)
  .map(([name, qty]) => `${name} (${qty})`)
  .join(", ");
      orderList.innerHTML += `
        <tr>
          <td>${order._id}</td>
          <td>${items}</td>
          <td>₹${order.total || order.totalPrice}</td>
          <td>
           <span class="status-badge ${
  order.status === "Completed"
  ? "status-completed"
  : "status-pending"
}">
  ${order.status}
</span>
          </td>
          <td>
            <button class="btn-complete"
              onclick="markComplete('${order._id}')">
              Mark Complete
            </button>
            <button class="btn-delete"
              onclick="deleteOrder('${order._id}')">
              Delete
            </button>
          </td>
        </tr>
      `;
    });
  } catch (error) {
    console.error(error);
  }
}
async function markComplete(id) {
  await fetch(`/api/orders/${id}`, {
    method: "PUT"
  });
  loadAdminOrders();
}
window.onload = loadAdminOrders;

setInterval(loadAdminOrders, 5000);
async function deleteOrder(id){
  if(!confirm("Delete this order?")) return;
  await fetch(`/api/orders/${id}`,{
    method:"DELETE"
  });
  loadAdminOrders();
}
</script>
</body>
</html>
